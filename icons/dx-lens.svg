<?xml version="1.0" encoding="UTF-8"?>
<!--
  DX Lens — Chrome Web Store icon.
  128x128 canvas · 96x96 safe artwork area (16px transparent padding per side).
  Transparent background · no intrinsic frame (the store adds one).
  Designed to read at 16px and to remain visible on both light and dark backgrounds.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="DX Lens">
  <title>DX Lens</title>

  <defs>
    <!-- Subtle outer halo so the blue lens stays legible on dark backgrounds. -->
    <filter id="halo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    All artwork is contained within the 16..112 safe zone (96x96 core).
    Magnifying-glass lens centered at (54,54), radius 28 → extends 26..82.
    Handle extends from ~(74,74) to (104,104). Everything stays within 16..112.
  -->
  <g filter="url(#halo)">
    <!-- Handle: dark core + light edge for contrast on both themes -->
    <line x1="74" y1="74" x2="104" y2="104"
          stroke="#1a73e8" stroke-width="16" stroke-linecap="round"/>
    <line x1="74" y1="74" x2="104" y2="104"
          stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>

    <!-- Lens rim -->
    <circle cx="54" cy="54" r="28"
            fill="none"
            stroke="#1a73e8" stroke-width="9"/>

    <!-- Clipboard-tree motif inside the lens:
         a small spine with three nodes branching off — evokes the tree view -->
    <g stroke="#1a73e8" stroke-width="3.5" stroke-linecap="round" fill="none">
      <path d="M 42 40 L 42 70"/>
      <path d="M 42 46 L 58 46"/>
      <path d="M 42 56 L 62 56"/>
      <path d="M 42 66 L 56 66"/>
    </g>
    <g fill="#1a73e8">
      <circle cx="42" cy="40" r="4"/>
      <circle cx="60" cy="46" r="3.2"/>
      <circle cx="64" cy="56" r="3.2"/>
      <circle cx="58" cy="66" r="3.2"/>
    </g>
  </g>
</svg>
