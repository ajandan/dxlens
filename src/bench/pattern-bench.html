<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DX Lens — pattern-match microbenchmark</title>
    <style>
      body { font: 13px/1.4 -apple-system, system-ui, sans-serif; padding: 16px; max-width: 720px; }
      table { border-collapse: collapse; margin-top: 10px; }

    <div id="out"></div>
