<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DX Lens — Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>DX Lens — Settings</h1>
      <p class="muted">All settings are local to this browser. No settings or captured data ever leave your machine.</p>

      <section>
        <h2>URL patterns</h2>
        <p class="muted">One pattern per line. Only requests whose URL contains at least one pattern are captured.</p>
        <textarea id="urlPatterns" rows="6" spellcheck="false"></textarea>
      </section>

      <section>
        <h2>Snapshots</h2>
        <label>
          <span>Retain up to</span>
          <input id="snapshotCap" type="number" min="1" max="20" step="1">
          <span class="muted">snapshots per tab (max 20)</span>
        </label>
      </section>

      <section>
        <h2>Body size limit</h2>
        <label>
          <span>Truncate bodies larger than</span>
          <input id="bodyLimitMB" type="number" min="0.0625" max="8" step="0.25">
          <span class="muted">MB</span>
        </label>
      </section>

      <section>
        <h2>Auto-snapshot</h2>
        <label>
          <input id="autoSnapshot" type="checkbox">
          <span>Take before/after snapshots automatically around submit-like actions</span>
        </label>
      </section>

      <section>
        <h2>Appearance</h2>
        <label>
          <span>Theme</span>
          <select id="theme">
            <option value="devtools">Follow DevTools</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <label>
          <span>Reduced motion</span>
          <select id="reducedMotion">
            <option value="auto">Auto (system)</option>
            <option value="on">Always on</option>
            <option value="off">Always off</option>
          </select>
        </label>
      </section>

      <div class="actions">
        <button id="save" type="button">Save</button>
        <button id="reset" type="button">Reset to defaults</button>
        <span id="status" class="muted"></span>
      </div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
