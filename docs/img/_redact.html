<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body { margin: 0; padding: 0; background: #fff; overflow: hidden; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      const img = new Image();
      img.onload = () => {
        const c = document.getElementById('c');
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0);

        // Paint white (panel background) over the three email occurrences
        // identified at zoom. Y coords are generous to cover font descenders.
        // Redact the three `= "aajanthan@virtusa.com"` occurrences.
        // Each rect covers from just past the key name to just past the
        // closing quote. We then paint `= "<redacted>"` on top starting at
        // the rect's left edge so the row reads as clean output.
        // Redact the three `"aajanthan@virtusa.com"` string values. Each
        // rect covers opening-quote..closing-quote; `= ` stays visible.
        const rects = [
          // owner
          { x: 1465, y: 304, w: 220, h: 20 },
          // lastUpdatedBy
          { x: 1525, y: 361, w: 170, h: 20 },
          // createdBy
          { x: 1498, y: 535, w: 190, h: 19 }
        ];
        ctx.fillStyle = '#ffffff';
        for (const r of rects) ctx.fillRect(r.x, r.y, r.w, r.h);

        // Paint `"<redacted>"` replacing the scrubbed value.
        ctx.fillStyle = '#888';
        ctx.font = '13px ui-monospace, Consolas, monospace';
        ctx.textBaseline = 'middle';
        for (const r of rects) ctx.fillText('"<redacted>"', r.x + 2, r.y + r.h / 2);

        document.title = 'ready:' + c.width + 'x' + c.height;
      };
      img.src = 'screenshot-clipboard.png';
    </script>
  </body>
</html>
