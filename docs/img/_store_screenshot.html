<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body { margin: 0; padding: 0; background: #0f172a; overflow: hidden; }
      body {
        width: 1280px; height: 800px;
        display: flex; align-items: center; justify-content: center;
        font: 14px/1.4 -apple-system, system-ui, "Segoe UI", sans-serif;
        color: #e6e6e6;
      }
      .frame {
        width: 1200px; height: 720px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px;
      }
      .title { font-weight: 600; font-size: 20px; letter-spacing: 0.2px; }
      .subtitle { color: #94a3b8; font-size: 13px; }
      img.shot {
        max-width: 1200px; max-height: 640px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.35);
        border-radius: 6px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="title">DX Lens — classic Pega Clipboard for Constellation</div>
      <img class="shot" src="screenshot-clipboard.png" alt="">
      <div class="subtitle">Side-panel clipboard tree · Snapshots · Diff · Search · 100% local, zero egress</div>
    </div>
  </body>
</html>
